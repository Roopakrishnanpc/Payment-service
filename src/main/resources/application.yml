server:
  port: 8085

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/payment_db
    username: root
    password: roopa
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

#  security:
#    oauth2:
#      resourceserver:
#        jwt:
#          #issuer-uri: http://localhost:8082/realms/movie-realm
#          secret-key: my-super-secret-key-my-super-secret-key-123456
jwt:
  secret: my-super-secret-key-my-super-secret-key-123456
  expiration: 3600000
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

resilience4j:
  circuitbreaker:
    instances:
      paymentService:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
  retry:
    instances:
      paymentService:
        maxAttempts: 3
        waitDuration: 1s

payment:
  simulate-failure: false
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
